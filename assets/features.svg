<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" fill="none">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1929"/><stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="c2" x1="310" y1="0" x2="590" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1929"/><stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="c3" x1="620" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1929"/><stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Card 1 -->
  <rect x="0" y="0" width="280" height="340" rx="14" fill="url(#c1)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="0" y="0" width="280" height="4" rx="2" fill="#f59e0b"/>
  <text x="140" y="50" text-anchor="middle" font-size="30">&#128274;</text>
  <text x="140" y="82" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="white">Device Lockdown</text>
  <line x1="90" y1="98" x2="190" y2="98" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" fill="#cbd5e1">
    <text x="30" y="132"><tspan fill="#f59e0b">&#9656;</tspan>  Lock factory reset</text>
    <text x="30" y="162"><tspan fill="#f59e0b">&#9656;</tspan>  Block additional users</text>
    <text x="30" y="192"><tspan fill="#f59e0b">&#9656;</tspan>  Disable system &amp; unwanted apps</text>
    <text x="30" y="222"><tspan fill="#f59e0b">&#9656;</tspan>  Disable ADB access</text>
    <text x="30" y="252"><tspan fill="#f59e0b">&#9656;</tspan>  Block APK sideloading</text>
  </g>
  <!-- Card 2 -->
  <rect x="310" y="0" width="280" height="340" rx="14" fill="url(#c2)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="310" y="0" width="280" height="4" rx="2" fill="#38bdf8"/>
  <text x="450" y="50" text-anchor="middle" font-size="30">&#128225;</text>
  <text x="450" y="82" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="white">Network Control</text>
  <line x1="400" y1="98" x2="500" y2="98" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" fill="#cbd5e1">
    <text x="340" y="132"><tspan fill="#38bdf8">&#9656;</tspan>  Disable wifi tethering</text>
    <text x="340" y="162"><tspan fill="#38bdf8">&#9656;</tspan>  Lock wifi configuration</text>
    <text x="340" y="192"><tspan fill="#38bdf8">&#9656;</tspan>  Disable WebView controls</text>
    <text x="340" y="222"><tspan fill="#38bdf8">&#9656;</tspan>  Disable video playback</text>
    <text x="340" y="252"><tspan fill="#38bdf8">&#9656;</tspan>  Full network policy enforcement</text>
  </g>
  <!-- Card 3 -->
  <rect x="620" y="0" width="280" height="340" rx="14" fill="url(#c3)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="620" y="0" width="280" height="4" rx="2" fill="#a78bfa"/>
  <text x="760" y="50" text-anchor="middle" font-size="30">&#128737;</text>
  <text x="760" y="82" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="white">Content Filtering</text>
  <line x1="710" y1="98" x2="810" y2="98" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" fill="#cbd5e1">
    <text x="650" y="132"><tspan fill="#a78bfa">&#9656;</tspan>  Block ads &amp; malware</text>
    <text x="650" y="162"><tspan fill="#a78bfa">&#9656;</tspan>  Block gambling sites</text>
    <text x="650" y="192"><tspan fill="#a78bfa">&#9656;</tspan>  Block adult content</text>
    <text x="650" y="222"><tspan fill="#a78bfa">&#9656;</tspan>  Block social media</text>
    <text x="650" y="252"><tspan fill="#a78bfa">&#9656;</tspan>  Powered by Mullvad.net DNS</text>
  </g>
