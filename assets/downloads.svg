<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1929"/><stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="900" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="50%" stop-color="#818cf8"/><stop offset="100%" stop-color="#2ea44f"/>
    </linearGradient>
  </defs>
  <rect width="900" height="240" rx="16" fill="url(#border)"/>
  <rect x="1.5" y="1.5" width="897" height="237" rx="15" fill="url(#bg)"/>
  <!-- title -->
  <text x="450" y="40" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748b" letter-spacing="3">DOWNLOADS</text>
  <!-- Card 1: eGateHelper (Windows) -->
  <rect x="30" y="60" width="260" height="150" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="30" y="60" width="260" height="3" rx="1.5" fill="#38bdf8"/>
  <!-- windows icon -->
  <g transform="translate(50, 82)" fill="#38bdf8">
    <rect x="0" y="0" width="10" height="10" rx="1"/><rect x="13" y="0" width="10" height="10" rx="1"/>
    <rect x="0" y="13" width="10" height="10" rx="1"/><rect x="13" y="13" width="10" height="10" rx="1"/>
  </g>
  <text x="85" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="white">eGateHelper</text>
  <text x="85" y="113" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">Windows Installer  &#8226;  v1.38.0</text>
  <text x="50" y="145" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">Setup wizard for configuring and</text>
  <text x="50" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">deploying eGate to your devices.</text>
  <rect x="50" y="178" width="110" height="24" rx="12" fill="#38bdf8" opacity="0.15"/>
  <text x="105" y="194" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#38bdf8">Recommended</text>
  <!-- Card 2: General APK -->
  <rect x="320" y="60" width="260" height="150" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="320" y="60" width="260" height="3" rx="1.5" fill="#4ade80"/>
  <!-- android icon -->
  <g transform="translate(340, 80)" fill="#4ade80">
    <rect x="3" y="10" width="18" height="14" rx="3"/>
    <rect x="7" y="3" width="2" height="6" rx="1"/><rect x="15" y="3" width="2" height="6" rx="1"/>
    <circle cx="8" cy="15" r="1.5" fill="#0f172a"/><circle cx="16" cy="15" r="1.5" fill="#0f172a"/>
  </g>
  <text x="375" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="white">General APK</text>
  <text x="375" y="113" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">Android  &#8226;  v1.38</text>
  <text x="340" y="145" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">Standard eGate build for most</text>
  <text x="340" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">Android devices.</text>
  <!-- Card 3: Accessibility APK -->
  <rect x="610" y="60" width="260" height="150" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="610" y="60" width="260" height="3" rx="1.5" fill="#a78bfa"/>
  <!-- accessibility icon -->
  <g transform="translate(630, 80)" fill="#a78bfa">
    <circle cx="12" cy="5" r="4"/>
    <path d="M4 12h16M12 12v10M8 22l4-5 4 5" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="665" y="96" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="white">Accessibility APK</text>
  <text x="665" y="113" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">Android  &#8226;  v1.38</text>
  <text x="630" y="145" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">eGate build with external</text>
  <text x="630" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#94a3b8">accessibility service support.</text>
</svg>
